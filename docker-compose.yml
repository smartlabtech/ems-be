version: '3.8'

services:
  app:
    # Option 1: Build from Dockerfile (default)
    build:
      context: .
      dockerfile: Dockerfile
    
    # Option 2: Use pre-built image from GitHub Container Registry
    # Uncomment the line below and comment out the build section above
    # image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
    
    ports:
      - "3041:3041"
    environment:
      NODE_ENV: production
      PORT: 3041
      DATABASE_URI: ${DATABASE_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-50mb}
      MAX_CONTENT_CHARS: ${MAX_CONTENT_CHARS:-80000}
      # Add other environment variables as needed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3041/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge